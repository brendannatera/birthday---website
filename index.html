<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Tams 💜</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ====================================== -->
    <!-- PAGE 1 - VERIFICATION -->
    <!-- ====================================== -->

    <section id="page1">

        <div class="card">

            <h1>Birthday Message System</h1>

            <h3>Version 2.0</h3>

            <p>
                Before proceeding, we need to verify your identity.
            </p>

            <h2>Are you Tamera?</h2>

            <div class="buttons">

                <button id="yesButton">
                    Yes, that's me
                </button>

                <button id="noButton">
                    No
                </button>

            </div>

        </div>

    </section>

    <!-- ====================================== -->
    <!-- LOADING SCREEN -->
    <!-- ====================================== -->

    <section id="loadingScreen">

        <div class="loadingContainer">

            <div class="spinner"></div>

            <h2 id="loadingText">
                Initializing...
            </h2>

            <p id="loadingSubtext"></p>

            <div class="progressBar">

                <div id="progress"></div>

            </div>

            <p id="progressPercent">0%</p>

        </div>

    </section>

    <!-- ====================================== -->
    <!-- MEMORY SCREEN -->
    <!-- ====================================== -->

    <section id="memoryScreen">

        <h1>
            Someone made this
            <br>
            just for you. 💜
        </h1>

    </section>

    <!-- ====================================== -->
    <!-- CONFIRMATION PAGE -->
    <!-- ====================================== -->

    <section id="confirmationPage">

        <div class="card">

            <h1>Final Confirmation</h1>

            <p>Are you ready?</p>

            <div class="buttons">

                <button id="readyButton">
                    YES!!
                </button>

                <button id="maybeButton">
                    Maybe...
                </button>

            </div>

        </div>

    </section>

    <!-- ====================================== -->
    <!-- BIRTHDAY PAGE -->
    <!-- ====================================== -->

    <section id="birthdayPage">

        <div class="card">

            <h1 id="birthdayTitle"></h1>

            <p id="birthdayMessage"></p>

            <button id="restartButton">
                Restart
            </button>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
